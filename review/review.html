<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo Sync Review</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="review.css">
</head>

<body>

<!-- Backdrop -->
<div class="asr-backdrop" id="asrBackdrop">

    <!-- Popup card -->
    <div class="container" id="asrCard" role="dialog" aria-modal="true" aria-labelledby="problemName">

        <button class="asr-close" id="asrClose" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M1 1L15 15M15 1L1 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </button>

        <div class="asr-header">
            <span class="asr-rocket" aria-hidden="true">🚀</span>
            <h1>Algo Sync</h1>
            <p class="asr-tagline">Nice work. Let's lock in what you learned.</p>
        </div>

        <h2 id="problemName">Loading...</h2>
        <p id="language"></p>

        <div class="info">

            <div class="asr-stat">
                <strong>Runtime</strong>
                <p id="runtime">--</p>
                <span class="asr-stat-bar"><span class="asr-stat-fill" data-fill="runtime"></span></span>
            </div>

            <div class="asr-stat">
                <strong>Memory</strong>
                <p id="memory">--</p>
                <span class="asr-stat-bar"><span class="asr-stat-fill" data-fill="memory"></span></span>
            </div>

        </div>

        <hr>

        <div class="asr-field">
            <label for="notes">Your Findings</label>
            <textarea
                id="notes"
                placeholder="What did you learn from this problem?"
                rows="3"
            ></textarea>
            <span class="asr-count" id="asrNotesCount">0 / 400</span>
        </div>

        <div class="asr-row">
            <div class="asr-field">
                <label for="time">Time Complexity</label>
                <input
                    id="time"
                    placeholder="O(n)"
                    autocomplete="off"
                >
            </div>

            <div class="asr-field">
                <label for="space">Space Complexity</label>
                <input
                    id="space"
                    placeholder="O(1)"
                    autocomplete="off"
                >
            </div>
        </div>

        <!-- <div class="asr-field">
            <label for="images">Flowcharts / Notes</label>

            <label class="asr-dropzone" id="asrDropzone" for="images">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M12 16V4M12 4L7 9M12 4L17 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 16V18C4 19.1046 4.89543 20 6 20H18C19.1046 20 20 19.1046 20 18V16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span class="asr-drop-text">Drag images here or <b>browse</b></span>
                <input
                    id="images"
                    type="file"
                    multiple
                    accept="image/*"
                >
            </label>

            <div class="asr-previews" id="asrPreviews"></div>
        </div> -->

        <button id="upload">
            <span class="asr-btn-content">
                <span class="asr-btn-text">Upload</span>
                <svg class="asr-spinner" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="30" stroke-dashoffset="10"/>
                </svg>
                <svg class="asr-check" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M3 8.5L6.5 12L13 4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </button>

    </div>
</div>

<script src="review.js"></script>

</body>

</html>
